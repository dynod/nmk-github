#
# !!! Build workflow, generated by nmk-github plugin, don't edit !!!
#
name: Build
on: push
jobs:
    # Only on branch push
    tests:
        name: Build and Test - Python ${{ '{{' }} matrix.version {{ '}}' }} - ${{ '{{' }} matrix.os {{ '}}' }}
        if: github.event_name == 'push' && !startsWith(github.event.ref, 'refs/tags')
        strategy:
            fail-fast: false
            matrix:
                os:{% for os in images %}
                    - {{ os }}{% endfor %}
                version:{% for version in pythonVersions %}
                    - "{{ version }}"{% endfor %}
        runs-on: ${{ '{{' }} matrix.os {{ '}}' }}
        steps:
            # Checkout and fetch tags
            - name: Checkout
              uses: actions/checkout@v6.0.1
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  submodules: true

            # Setup python through uv
            - name: Install uv
              uses: astral-sh/setup-uv@v8.2.0
              with:
                  python-version: ${{ '{{' }} matrix.version {{ '}}' }}
                  enable-cache: false
            - name: Fix uv python path
              shell: bash
              run: echo "UV_PYTHON_BIN_DIR=$UV_PYTHON_INSTALL_DIR" >> $GITHUB_ENV
            - name: Set up Python ${{ '{{' }} matrix.version {{ '}}' }}
              run: uv python install ${{ '{{' }} matrix.version {{ '}}' }} --default

            # Trigger build and tests + archive output
            - name: Build and tests
              id: build_n_tests
              shell: bash
              run: {{ githubCommand }}
              continue-on-error: true
            - name: Archive build output
              uses: actions/upload-artifact@v6.0.0
              with:
                  name: Output-${{ '{{' }} matrix.os {{ '}}' }}-${{ '{{' }} matrix.version {{ '}}' }}
                  path: |
                    .nmk/nmk.log*
                    out/
            - name: Build Failed!
              if: steps.build_n_tests.outcome == 'failure'
              uses: actions/github-script@v8.0.0
              with:
                script: |
                    core.setFailed('Build step failed')

{% if githubPackageCommand %}            # Package
            - name: Package
              shell: bash
              run: {{ githubPackageCommand }}
            - name: Archive artifacts
              uses: actions/upload-artifact@v6.0.0
              with:
                  name: Artifacts-${{ '{{' }} matrix.os {{ '}}' }}-${{ '{{' }} matrix.version {{ '}}' }}
                  path: |
                    out/artifacts/

{% endif %}{% for extraStep in buildExtraSteps %}
            - {% for buildKey in extraStep %}{{ buildKey }}: {{ extraStep[buildKey] }}
              {% endfor %}
{% endfor %}{% if githubPackageCommand %}

    # Only on tags push
    publish:
        name: Publish
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
        steps:
            # Official build
            - name: Checkout
              uses: actions/checkout@v6.0.1
              with:
                  fetch-depth: 0
                  fetch-tags: true
                  submodules: true
            - name: Install uv
              uses: astral-sh/setup-uv@v8.2.0
              with:
                  python-version: {{ githubDetectedPythonVersions[0] }}
                  enable-cache: false
            - name: Fix uv python path
              shell: bash
              run: echo "UV_PYTHON_BIN_DIR=$UV_PYTHON_INSTALL_DIR" >> $GITHUB_ENV
            - name: Set up Python
              run: uv python install {{ githubDetectedPythonVersions[0] }} --default
            - name: Build
              run: {{ githubPackageCommand }}
{% for extraStep in publishExtraSteps %}
            - {% for buildKey in extraStep %}{{ buildKey }}: {{ extraStep[buildKey] }}
              {% endfor %}
{% endfor %}{% endif %}
